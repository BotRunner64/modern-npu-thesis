name: Render thesis

on:
  push:
    paths:
      - ".github/workflows/render-thesis.yml"
      - ".github/typst-packages.typ"
      - "template/**"
      - "layouts/**"
      - "pages/**"
      - "utils/**"
      - "fonts/**"
      - "lib.typ"
      - "typst.toml"
      - "README.md"
  pull_request:
    paths:
      - ".github/workflows/render-thesis.yml"
      - ".github/typst-packages.typ"
      - "template/**"
      - "layouts/**"
      - "pages/**"
      - "utils/**"
      - "fonts/**"
      - "lib.typ"
      - "typst.toml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render:
    name: Render on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Typst
        uses: typst-community/setup-typst@v4
        with:
          typst-version: 0.14.2
          cache-dependency-path: .github/typst-packages.typ

      - name: Create output directory
        run: New-Item -ItemType Directory -Force -Path dist | Out-Null

      - name: Compile thesis
        run: typst compile --root . --font-path fonts template/thesis.typ dist/thesis.pdf

      - name: Upload PDF artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v6
        with:
          name: thesis-pdf
          path: dist/thesis.pdf
